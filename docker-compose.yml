version: "3.9"

services:
  webodm:
    image: opendronemap/webodm:latest
    ports:
      - "8000:8000"
    volumes:
      - webodm_data:/webodm/app/media
    environment:
      - WO_HOST=0.0.0.0
      - WO_PORT=8000
    deploy:
      resources:
        limits:
          memory: 8G
    profiles:
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - DEMO_MODE=true
      - WEBODM_URL=http://webodm:8000
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  webodm_data:
